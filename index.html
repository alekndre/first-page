<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="css/style.css">

  <body>
    <header class="navbar">
      <a href="index.html" class="logo">
        <img src="img/logo_ms.png" alt="MontechSerwis" class="logo-img">

      <nav class="nav-links">
        <a href="o-nas.html">O firmie</a>
        <a href="uslugi.html">Usługi</a>
        <a href="projekty.html">Projekty</a>
        <a href="kontakt.html">Kontakt</a>
      </nav>

      <button class="theme-toggle" aria-label="Przełącz motyw">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22

      </button>

  <div class="hero">

    <img src="img/p_ms3.jpg" alt="Opis 3" class="hero-slide">

    <div class="hero-text">
      <h1>Montech Serwis</h1>
      <p class="subtitle">Montaż i serwis instalacji</p>
    </div>
  </div>

    <div class="content">
      <nav class="panel">
        <a href="o-nas.html" class="tile">O firmie</a>

  <section class="logo-marquee" aria-label="Montech Partners">

      <div class="logo-marquee__item"><img src="img/partners/partner-viega.png" alt="Viega"></div>
      <div class="logo-marquee__item"><img src="img/partners/partner-gf.png" alt="Georg Fischer"></div>
      <div class="logo-marquee__item"><img src="img/partners/partner-blucher.png" alt="Blücher"></div> 
      <div class="logo-marquee__item"><img src="img/partners/partner-marioff.png" alt="Marioff"></div>
      <div class="logo-marquee__item"><img src="img/partners/partner-roxtec.png" alt="Parker"></div>
      <div class="logo-marquee__item"><img src="img/partners/partner-parker.png" alt="Roxtec"></div>
      <div class="logo-marquee__item"><img src="img/partners/partner-geberit.png" alt="Geberit"></div>
